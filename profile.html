<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1020">
  <title>Public profile • Arcade Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap">
  <link rel="stylesheet" href="/css/portal.css">
  <link rel="stylesheet" href="/css/public-profile.css">
  <script src="/js/i18n.js" defer></script>
  <script src="/js/auth/supabase-config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" defer></script>
  <script src="/js/user-ui-state.js" defer></script>
  <script src="/js/auth/supabaseClient.js" defer></script>
  <script src="/js/profile-client.js" defer></script>
  <script src="/js/chips/client.js" defer></script>
  <script src="/js/core/number-format.js" defer></script>
  <script src="/js/topbar.js" defer></script>
  <script src="/js/xpClient.js" defer></script>
  <script src="/js/ui/xp-overlay.js" defer></script>
  <script src="/js/xp/combo.js" defer></script>
  <script src="/js/xp/scoring.js" defer></script>
  <script src="/js/xp/core.js" defer></script>
  <script src="/js/xp.js" defer></script>
  <script src="/js/public-profile-page.js" defer></script>
</head>
<body>
  <header class="topbar" data-user-ui-state="pending">
    <div class="topbar-left">
      <a href="/index.html" class="brand" aria-label="Arcade Hub home"><div class="logo" aria-hidden="true"></div><h1>Arcade Hub</h1></a>
    </div>
    <div class="topbar-right">
      <a id="xpBadge" class="xp-badge xp-badge--loading" aria-live="polite" aria-busy="true" href="/xp.html"><span class="xp-badge__label">XP</span></a>
      <div class="avatar-shell" id="avatarShell">
        <button type="button" class="avatar-btn" id="avatarButton" aria-haspopup="true" aria-expanded="false"><span class="avatar-circle" id="avatarInitials" aria-hidden="true">AH</span><span class="avatar-label" id="avatarLabel">Sign in</span><span class="avatar-caret" aria-hidden="true">▾</span></button>
        <div class="avatar-menu" id="avatarMenu" hidden>
          <div class="avatar-menu__user" id="avatarMenuUser">
            <span class="avatar-menu__initials" id="avatarMenuInitials" aria-hidden="true">AH</span>
            <span class="avatar-menu__meta"><span class="avatar-menu__name" id="avatarMenuName">Guest</span><span class="avatar-menu__email" id="avatarMenuEmail">Sign in to sync progress</span></span>
          </div>
          <button type="button" class="avatar-menu__action" id="avatarMenuAction">Sign in</button>
        </div>
      </div>
    </div>
  </header>
  <main class="public-profile" aria-labelledby="publicProfileName">
    <p class="public-profile__status" id="publicProfileStatus" aria-live="polite" data-i18n="publicProfileLoading">Loading profile...</p>
    <article class="public-profile__card" id="publicProfileCard" aria-busy="true">
      <div class="public-profile__identity" id="publicProfileIdentity" hidden>
        <div class="public-profile__avatar" id="publicProfileAvatar" role="img">AH</div>
        <div><h1 class="public-profile__name" id="publicProfileName"></h1><p class="public-profile__handle" id="publicProfileHandle"></p></div>
      </div>
      <div class="public-profile__stats" aria-label="Public profile stats">
        <div><strong class="public-profile__stat-loading" id="publicProfileXp" aria-label="Loading"></strong> <span data-i18n="publicProfileXpLabel">XP</span></div>
        <div><strong class="public-profile__stat-loading" id="publicProfileLevel" aria-label="Loading"></strong> <span data-i18n="publicProfileLevelLabel">Level</span></div>
      </div>
      <p class="public-profile__bio" id="publicProfileBio" hidden></p>
    </article>
  </main>
</body>
</html>
