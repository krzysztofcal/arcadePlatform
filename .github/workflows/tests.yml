name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: contractpass
          POSTGRES_DB: reset_contract
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d reset_contract"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CHIPS_RESET_CLI_TEST_DB_URL: postgresql://postgres:contractpass@127.0.0.1:5432/reset_contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm i

      - name: Validate games catalog
        run: npm run lint:games

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: PLAYWRIGHT=1 npm test
        env:
          PLAYWRIGHT_BROWSER: chromium
