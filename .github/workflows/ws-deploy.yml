name: WS Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - "ws-server/**"
      - "ws-tests/**"
      - "shared/**"
      - "poker/**"
      - "tests/**"
      - "scripts/test-all.mjs"
      - ".github/workflows/ws-deploy.yml"

jobs:
  ws-harness-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install WS server dependencies
        run: npm ci --prefix ws-server

      - name: Run ws-server package runtime deps guard test
        run: node --test ws-tests/ws-server-package-runtime-deps.guard.test.mjs

      - name: Run shared poker join behavior test
        run: node --test shared/poker-domain/join.behavior.test.mjs


      - name: Validate ws Dockerfile build contract (repo-root context)
        run: |
          set -euo pipefail
          docker build -t arcadeplatform-ws-contract:${{ github.sha }} -f ws-server/Dockerfile .
          docker image rm -f arcadeplatform-ws-contract:${{ github.sha }}

      - name: Run WS behavior test
        run: node --test ws-server/server.behavior.test.mjs

      - name: Run ws auth verifier behavior test
        run: node --test ws-server/poker/auth/verify-token.behavior.test.mjs

      - name: Run ws conn-state behavior test
        run: node --test ws-server/poker/runtime/conn-state.behavior.test.mjs

      - name: Run ws table behavior test
        run: node --test ws-server/poker/table/table.behavior.test.mjs

      - name: Run ws table snapshot behavior test
        run: node --test ws-server/poker/table/table-snapshot.behavior.test.mjs

      - name: Run ws table manager behavior test
        run: node --test ws-server/poker/table/table-manager.behavior.test.mjs
      - name: Run authoritative leave adapter behavior test
        run: node --test ws-server/poker/persistence/authoritative-leave-adapter.behavior.test.mjs


      - name: Run persisted bootstrap adapter behavior test
        run: node --test ws-server/poker/bootstrap/persisted-bootstrap-adapter.behavior.test.mjs

      - name: Run persisted bootstrap repository behavior test
        run: node --test ws-server/poker/bootstrap/persisted-bootstrap-repository.behavior.test.mjs


      - name: Run ws poker engine bootstrap behavior test
        run: node --test ws-server/poker/engine/engine-bootstrap.behavior.test.mjs

      - name: Run ws poker engine act behavior test
        run: node --test ws-server/poker/engine/engine-act.behavior.test.mjs

      - name: Run ws poker engine rollover behavior test
        run: node --test ws-server/poker/engine/engine-rollover.behavior.test.mjs

      - name: Run ws poker engine timeout behavior test
        run: node --test ws-server/poker/engine/engine-timeout.behavior.test.mjs

      - name: Run ws core behavior test
        run: node --test ws-server/poker/core/core.behavior.test.mjs

      - name: Run room-core snapshot behavior test
        run: node --test ws-server/poker/read-model/room-core-snapshot.behavior.test.mjs

      - name: Run state-snapshot behavior test
        run: node --test ws-server/poker/read-model/state-snapshot.behavior.test.mjs

      - name: Run state-patch behavior test
        run: node --test ws-server/poker/read-model/state-patch.behavior.test.mjs

      - name: Run stream-log behavior test
        run: node --test ws-server/poker/runtime/stream-log.behavior.test.mjs

      - name: Run poker primitives behavior test
        run: node --test ws-server/poker/shared/poker-primitives.behavior.test.mjs

      - name: Run poker turn timeout behavior test
        run: node --test ws-server/poker/shared/poker-turn-timeout.behavior.test.mjs

      - name: Run poker action reducer behavior test
        run: node --test ws-server/poker/shared/poker-action-reducer.behavior.test.mjs

      - name: Run ws resync behavior test
        run: node --test ws-server/poker/reconnect/resync.behavior.test.mjs

      - name: Run ws join handler behavior test
        run: node --test ws-server/poker/handlers/join.behavior.test.mjs

      - name: Run ws start-hand handler behavior test
        run: node --test ws-server/poker/handlers/start-hand.behavior.test.mjs

      - name: Run ws act handler behavior test
        run: node --test ws-server/poker/handlers/act.behavior.test.mjs

      - name: Run workflow-content test
        run: node --test ws-tests/ws-deploy-workflow.test.mjs

      - name: Run ws auth workflow guard behavior test
        run: node --test ws-tests/ws-ws-auth-workflow.guard.behavior.test.mjs

      - name: Run ws table workflow guard behavior test
        run: node --test ws-tests/ws-table-workflow.guard.behavior.test.mjs

      - name: Run ws core workflow guard behavior test
        run: node --test ws-tests/ws-core-workflow.guard.behavior.test.mjs

      - name: Run ws resync workflow guard behavior test
        run: node --test ws-tests/ws-resync-workflow.guard.behavior.test.mjs

      - name: Run ws-server deploy workflow guard test
        run: node --test ws-tests/ws-server-deploy.workflow.guard.test.mjs

      - name: Run ws-server deploy remote-script behavior test
        run: node --test ws-tests/ws-server-deploy.remote-script.behavior.test.mjs

      - name: Run ws-server deploy health-gate retry behavior test
        run: node --test ws-tests/ws-server-deploy.health-gate-retry.behavior.test.mjs

      - name: Run ws-server deploy sudo-preflight guard test
        run: node --test ws-tests/ws-server-deploy.sudo-preflight.guard.test.mjs

      - name: Run ws-server deploy runner-smoke behavior test
        run: node --test ws-tests/ws-server-deploy.runner-smoke.behavior.test.mjs

      - name: Run ws-server deploy artifact path guard test
        run: node --test ws-tests/ws-server-deploy.artifact-path.guard.test.mjs

      - name: Run ws production deploy collision guard test
        run: node --test ws-tests/ws-production-deploy-collision.guard.test.mjs

      - name: Run ws-deploy no-prod-mutation-on-ws-tests guard test
        run: node --test ws-tests/ws-deploy.no-prod-mutation-on-ws-tests.guard.test.mjs

      - name: Run ws-deploy trigger-surface guard test
        run: node --test ws-tests/ws-deploy.trigger-surface.guard.test.mjs

      - name: Run ws-workflow trigger-surface behavior test
        run: node --test ws-tests/ws-workflow-trigger-surface.behavior.test.mjs

      - name: Run ws-server deploy scp-contract behavior test
        run: node --test ws-tests/ws-server-deploy.scp-contract.behavior.test.mjs

      - name: Run ws-server deploy gated-by-validate guard test
        run: node --test ws-tests/ws-server-deploy.deploy-gated-by-validate.guard.test.mjs

      - name: Run ws-server deploy artifact-path harness test
        run: node --test ws-tests/ws-server-deploy-artifact-path.test.mjs

      - name: Run ws-server deploy rollout harness test
        run: node --test ws-tests/ws-server-deploy-rollout.test.mjs

      - name: Run ws mint-token no-postgres dependency guard test
        run: node --test ws-tests/ws-mint-token.no-postgres-dep.guard.test.mjs

      - name: Run ws mint-token behavior test
        run: node --test ws-tests/ws-mint-token.behavior.test.mjs

      - name: Run ws mint-token test
        run: node --test ws-tests/ws-mint-token.test.mjs

      - name: Run ws table state payload test
        run: node --test ws-tests/ws-table-state-payload.test.mjs

      - name: Run ws tests location guard
        run: node --test ws-tests/ws-tests-location.guard.test.mjs

      - name: Run ws auth token mint doc test
        run: node --test ws-tests/ws-auth-token-mint-doc.test.mjs

      - name: Run ws tests suite completeness guard
        run: node --test ws-tests/ws-tests-suite-completeness.guard.test.mjs

      - name: Run ws room-core snapshot dependency guard test
        run: node --test ws-tests/ws-room-core-snapshot-dependency.guard.test.mjs

