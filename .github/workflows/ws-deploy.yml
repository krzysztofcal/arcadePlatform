        run: node --test ws-tests/infra-vps-workflow.smokecheck-structure.behavior.test.mjs

      - name: Run infra VPS WS smoke-check deps guard test
        run: node --test ws-tests/infra-vps-workflow.ws-smokecheck-deps.guard.test.mjs

      - name: Run infra VPS concurrency guard test
        run: node --test ws-tests/infra-vps-workflow.concurrency.guard.test.mjs

      - name: Run infra VPS bash exit propagation guard test
        run: node --test ws-tests/infra-vps-workflow.bash-exit-propagation.guard.test.mjs

      - name: Run lockfile integrity test
        run: node --test ws-tests/ws-lockfile-integrity.test.mjs

      - name: Run ws smoke-check script behavior test
        run: node --test ws-tests/ws-smoke-check-script.behavior.test.mjs

      - name: Run ws poker protocol doc test
        run: node --test ws-tests/ws-poker-protocol-doc.test.mjs

      - name: Run ws image protocol content behavior test
        run: node --test ws-tests/ws-image-contains-protocol.behavior.test.mjs

      - name: Run ws docker leave runtime guard test
        run: node --test ws-tests/ws-docker-leave-runtime.guard.test.mjs

      - name: Run ws container startup behavior test
        run: node --test ws-tests/ws-container-starts.behavior.test.mjs

      - name: Run ws-server deploy CodeQL URL substring guard test
        run: node --test ws-tests/ws-server-deploy.codeql-url-substring.guard.test.mjs

      - name: WS dependency graph guard test
        run: node --test ws-tests/ws-ws-dependency.guard.test.mjs

      - name: WS poker protocol compliance test
        run: node --test ws-tests/ws-poker-protocol-compliance.test.mjs
