<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>T-Rex Runner</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../../css/xp-badge.css" />
  <link rel="stylesheet" href="/css/xp-overlay.css" />
  <link rel="stylesheet" href="../../js/vendor/klaro/klaro.css">
  <script src="../../js/klaro-config.js" defer></script>
  <script src="../../js/vendor/klaro/klaro.js" defer></script>
  <script src="../../js/consent-services.js" defer></script>
</head>
<body data-game-host data-game-slug="t-rex" data-game-id="t-rex">
  <main class="game-shell">
    <header class="hud">
      <h1>T-Rex Runner</h1>
      <div class="scoreboard">
        <span id="score">00000</span>
        <span id="hi-score">HI 00000</span>
      </div>
      <a id="xpBadge" class="xp-badge xp-badge--loading" aria-live="polite" aria-busy="true" href="../../xp.html">
        <span class="xp-badge__label">Syncing XP…</span>
      </a>
    </header>
    <div id="game" class="interstitial-wrapper" data-game-surface role="img" aria-label="Side scrolling runner game">
      <div id="main-content">
        <div class="icon icon-offline" aria-hidden="true"></div>
      </div>
      <button id="details-button" type="button" hidden></button>
      <div id="offline-resources">
        <img id="offline-resources-1x" alt="" src="vendor/wayou-t-rex-runner/assets/default_100_percent/100-offline-sprite.png">
        <img id="offline-resources-2x" alt="" src="vendor/wayou-t-rex-runner/assets/default_200_percent/200-offline-sprite.png">
      </div>
    </div>
    <div class="controls">
      <p>Press <kbd>space</kbd>, <kbd>↑</kbd> or tap to jump.</p>
      <button id="restart" type="button">Restart</button>
    </div>
  </main>
  <footer class="footer">
    <a href="#" id="manageCookies">Manage cookies</a>
  </footer>
<script src="vendor/wayou-t-rex-runner/index.js"></script>
<script src="main.js"></script>
  <script src="/js/debug.js" defer></script>
  <script>window.__GAME_ID__ = 't-rex';</script>
  <script src="/js/xp/combo.js" defer></script>
  <script src="/js/xp/scoring.js" defer></script>
  <script src="/js/xp/core.js" defer></script>
  <script src="/js/xp.js" defer></script>
  <script src="/js/xp-game-hook.js" defer></script>
  <script src="/js/ui/xp-overlay.js" defer></script>
  <script>
    if (!window.__xpAutoBooted) {
      window.__xpAutoBooted = true;
      let tries = 0;
      function boot() {
        const bridge = window.GameXpBridge;
        if (bridge && typeof bridge.auto === "function") {
          bridge.auto();
          return;
        }
        if (tries++ >= 5) return;
        window.setTimeout(boot, Math.min(50 * tries, 200));
      }
      if (document.readyState === "complete") {
        boot();
      } else {
        window.addEventListener("DOMContentLoaded", boot, { once: true });
        window.addEventListener("load", boot, { once: true });
      }
    }
  </script>
  <script src="../../js/consent-manager.js" defer></script>
</body>
</html>
