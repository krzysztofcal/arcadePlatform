# Netlify configuration for Arcade Platform
# Documentation: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Generate build info before deploying
  # Command works for both root builds and landing/ subdirectory builds
  command = "if [ -f scripts/generate-build-info.js ]; then node scripts/generate-build-info.js; else node ../scripts/generate-build-info.js; fi"
  publish = "."
  functions = "netlify/functions"

[functions]
  # Function bundling settings
  node_bundler = "esbuild"

# =============================================================================
# Environment Variables Documentation
# =============================================================================
# These variables should be configured in Netlify's Environment Variables UI
# (Site configuration > Environment variables) for security reasons.
#
# REQUIRED SECRETS (set in Netlify UI, never in this file):
# - XP_DAILY_SECRET: 32+ character HMAC secret for cookie signing and temporary session fallback
# - XP_SESSION_SECRET: preferred 32+ character HMAC secret for signed XP sessions
# - UPSTASH_REDIS_REST_URL: Upstash Redis REST API URL
# - UPSTASH_REDIS_REST_TOKEN: Upstash Redis REST API token
#
# =============================================================================
# SERVER SESSION ENFORCEMENT (Production Rollout)
# =============================================================================
#
# Phase 1 - Monitoring (Warn Mode):
#   XP_SERVER_SESSION_WARN_MODE=1
#   XP_REQUIRE_SERVER_SESSION=0
#
#   In warn mode, requests without valid session tokens are logged but allowed.
#   Monitor logs for session validation failures before enforcing.
#
# Phase 2 - Enforcement:
#   XP_SERVER_SESSION_WARN_MODE=0
#   XP_REQUIRE_SERVER_SESSION=1
#
#   In enforce mode, requests without valid session tokens are rejected (401).
#   Only enable after verifying warn mode shows minimal legitimate failures.
#
# Session Enforcement Variables:
# | Variable                     | Values | Purpose                              |
# |------------------------------|--------|--------------------------------------|
# | XP_SERVER_SESSION_WARN_MODE  | 0 or 1 | Log session failures, don't block    |
# | XP_REQUIRE_SERVER_SESSION    | 0 or 1 | Reject requests without valid tokens |
#
# =============================================================================

# Development context - relaxed settings for local testing
[context.development.environment]
  XP_DEBUG = "1"
  XP_RATE_LIMIT_ENABLED = "0"
  XP_SESSION_RATE_LIMIT_ENABLED = "0"
  XP_SERVER_SESSION_WARN_MODE = "0"
  XP_REQUIRE_SERVER_SESSION = "0"
  WELCOME_BONUS_START_AT = "2025-06-01T00:00:00Z"
  WELCOME_BONUS_CHIPS = "500"

# Branch deploy context - same as production
[context.branch-deploy.environment]
  XP_DEBUG = "0"
  XP_RATE_LIMIT_ENABLED = "1"
  XP_SESSION_RATE_LIMIT_ENABLED = "1"
  WELCOME_BONUS_START_AT = "2025-06-01T00:00:00Z"
  WELCOME_BONUS_CHIPS = "500"

# Deploy preview context - relaxed for testing
# Supabase deploy-preview credentials must be configured in Netlify UI with stage DB values.
# Set SUPABASE_STAGE_PROJECT_REF in Netlify UI to the non-secret stage project ref.
[context.deploy-preview.environment]
  XP_DEBUG = "1"
  XP_RATE_LIMIT_ENABLED = "1"
  XP_SESSION_RATE_LIMIT_ENABLED = "1"
  XP_SERVER_SESSION_WARN_MODE = "1"
  XP_REQUIRE_SERVER_SESSION = "0"
  PUBLIC_PROFILES_ENABLED = "1"
  WELCOME_BONUS_START_AT = "2025-06-01T00:00:00Z"
  WELCOME_BONUS_CHIPS = "500"

# Production context - secure defaults
# NOTE: These are baseline values. Override in Netlify UI for sensitive settings.
[context.production.environment]
  XP_DEBUG = "0"
  XP_RATE_LIMIT_ENABLED = "1"
  XP_SESSION_RATE_LIMIT_ENABLED = "1"
  # Server session enforcement - enable gradually:
  # Step 1: Start with warn mode to monitor
  XP_SERVER_SESSION_WARN_MODE = "1"
  WELCOME_BONUS_START_AT = "2025-06-01T00:00:00Z"
  WELCOME_BONUS_CHIPS = "500"
  # Step 2: After verification, enable enforcement (set in Netlify UI)
  # XP_REQUIRE_SERVER_SESSION = "1"
  XP_REQUIRE_SERVER_SESSION = "0"
  PUBLIC_PROFILES_ENABLED = "0"

# =============================================================================
# All Environment Variables Reference
# =============================================================================
#
# Session Enforcement:
#   XP_SERVER_SESSION_WARN_MODE - Log but allow requests without valid tokens
#   XP_REQUIRE_SERVER_SESSION   - Reject requests without valid tokens (401)
#   XP_SESSION_SECRET           - Preferred 32+ character signed-session secret
#                                 (temporarily falls back to XP_DAILY_SECRET)
#
# Session Configuration:
#   XP_SESSION_TTL_SEC          - Session TTL in seconds (default: 604800 = 7 days)
#   XP_SESSION_RATE_LIMIT_IP    - Session creation rate limit per IP (default: 5/min)
#   XP_SESSION_RATE_LIMIT_ENABLED - Enable session creation rate limiting
#
# XP Caps:
#   XP_DAILY_CAP     - Max XP per day (default: 3000)
#   XP_SESSION_CAP   - Max XP per session (default: 300)
#   XP_DELTA_CAP     - Max XP per request (default: 300)
#
# Public profiles:
#   PUBLIC_PROFILES_ENABLED - Set to 1 only after approved Terms/Privacy copy is published with the public profile route.
#
# Rate Limiting:
#   XP_RATE_LIMIT_USER_PER_MIN - Requests per user per minute (default: 10)
#   XP_RATE_LIMIT_IP_PER_MIN   - Requests per IP per minute (default: 20)
#   XP_RATE_LIMIT_ENABLED      - Enable request rate limiting
#
# CORS:
#   XP_CORS_ALLOW - Comma-separated allowed origins
#                   Example: "https://play.kcswh.pl,http://localhost:4173"
#
# Security:
#   XP_COOKIE_SECURE - Force HTTPS-only cookies (recommended: 1)
#   XP_DAILY_SECRET  - HMAC secret for signing (32+ chars, set in UI)
#   XP_SESSION_SECRET - Signed XP session HMAC secret (32+ chars, set in UI)
#
# Debugging:
#   XP_DEBUG - Include debug info in responses (0 for production)
#
# Activity Validation:
#   XP_REQUIRE_ACTIVITY   - Require activity events for XP
#   XP_MIN_ACTIVITY_EVENTS - Minimum input events (default: 4)
#   XP_MIN_ACTIVITY_VIS_S  - Minimum visibility seconds (default: 8)
#
# Other:
#   XP_KEY_NS           - Redis key namespace (default: "kcswh:xp:v2")
#   XP_DRIFT_MS         - Allowed timestamp drift (default: 30000)
#   XP_LOCK_TTL_MS      - Request lock TTL (default: 3000)
#   XP_METADATA_MAX_BYTES - Max metadata size (default: 2048)
#
# =============================================================================

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://github.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://*.supabase.co https://github.com https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; connect-src 'self' https://*.netlify.app https://www.google-analytics.com https://*.supabase.co https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net wss://*.supabase.co wss://ws.kcswh.pl wss://ws-preview.kcswh.pl; frame-src 'self' https://app.netlify.com https://app.netlify.app https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://pagead2.googlesyndication.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/games-open/freedoom/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://www.googletagmanager.com https://github.com https://cdn.jsdelivr.net https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.supabase.co https://github.com https://www.googletagmanager.com https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net; connect-src 'self' https://*.netlify.app https://www.google-analytics.com https://*.supabase.co https://pagead2.googlesyndication.com https://googleads.g.doubleclick.net wss://*.supabase.co wss://ws.kcswh.pl wss://ws-preview.kcswh.pl; worker-src 'self' blob:; frame-src 'self' https://app.netlify.com https://app.netlify.app https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://pagead2.googlesyndication.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CSS and JS use stable filenames in this repo, so browsers must revalidate them
# after deploys. Long immutable caching is only safe for fingerprinted filenames.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects for Netlify Functions
[[redirects]]
  from = "/api/start-session"
  to = "/.netlify/functions/start-session"
  status = 200


[[redirects]]
  from = "/api/xp/start-session"
  to = "/.netlify/functions/start-session"
  status = 200

[[redirects]]
  from = "/api/xp/calculate"
  to = "/.netlify/functions/calculate-xp"
  status = 200

[[redirects]]
  from = "/api/favorites"
  to = "/.netlify/functions/favorites"
  status = 200

[[redirects]]
  from = "/u/:handle"
  to = "/profile.html"
  status = 200
